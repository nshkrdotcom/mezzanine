    <path d="M100 24L155.42 56V120L100 152L44.58 120V56L100 24Z" fill="#0D1621" fill-opacity="0.95" stroke="url(#mzShell)" stroke-width="4.6" stroke-linejoin="round"/>
    <path d="M100 42L140.13 65V111L100 134L59.87 111V65L100 42Z" fill="#111B29" stroke="url(#mzTrace)" stroke-width="3.2" stroke-linejoin="round"/>
    <path d="M100 56L126 71V101L100 116L74 101V71L100 56Z" fill="#101927" stroke="#E6FFF8" stroke-opacity="0.72" stroke-width="2.2" stroke-linejoin="round"/>
