    <path d="M67 103H133" stroke="url(#mzShell)" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M73 118H127" stroke="url(#mzTrace)" stroke-opacity="0.58" stroke-width="1.5"/>
    <path d="M59.87 65L140.13 65" stroke="#E9FFF8" stroke-opacity="0.48" stroke-width="1.35"/>
