<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Mezzanine logo</title>
  <desc id="desc">A layered hexagonal structure with stacked terraces and a suspended central span representing a reusable upper business layer.</desc>
  <defs>
    <linearGradient id="mzShell" x1="32" y1="24" x2="168" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7AE6D2"/>
      <stop offset="0.52" stop-color="#55A9FF"/>
      <stop offset="1" stop-color="#B983FF"/>
    </linearGradient>
    <linearGradient id="mzTrace" x1="54" y1="46" x2="146" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9FFF8"/>
      <stop offset="1" stop-color="#DCD7FF"/>
    </linearGradient>
    <radialGradient id="mzAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 100) rotate(90) scale(74)">
      <stop offset="0" stop-color="#8BCBFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#8BCBFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="mzShadow" x="14" y="12" width="172" height="178" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="11" stdDeviation="11" flood-color="#0B1220" flood-opacity="0.24"/>
    </filter>
    <filter id="mzBloom" x="38" y="38" width="124" height="124" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

